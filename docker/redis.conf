# Loopback only — the Node app is the sole consumer.
bind 127.0.0.1
protected-mode yes
port 6379

# Cache mode: persistence disabled. Durable state lives in MongoDB.
save ""
appendonly no

# Memory ceiling + eviction so a runaway session can't OOM the container.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Connection tuning for many concurrent collaborators.
tcp-backlog 511
tcp-keepalive 60
timeout 0
maxclients 512

# Logs go to stdout so Docker / Azure capture them.
logfile ""
loglevel notice
